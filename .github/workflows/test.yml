name: Vitest CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest
        env:
          VITE_SUPABASE_URL: "https://placeholder-url.supabase.co"
          VITE_SUPABASE_ANON_KEY: "dummy-key-for-testing"
        run: npx vitest run
